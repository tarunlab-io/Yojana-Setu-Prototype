global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: yojana-setu

scrape_configs:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres:5432']

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']

  # ─── Application Services ─────────────────────────────────────────────────
  - job_name: profile-service
    metrics_path: /metrics
    static_configs:
      - targets: ['profile-service:3001']
        labels:
          service: profile-service

  - job_name: scheme-service
    metrics_path: /metrics
    static_configs:
      - targets: ['scheme-service:3002']
        labels:
          service: scheme-service

  - job_name: voice-service
    metrics_path: /metrics
    static_configs:
      - targets: ['voice-service:3003']
        labels:
          service: voice-service

  - job_name: document-service
    metrics_path: /metrics
    static_configs:
      - targets: ['document-service:3004']
        labels:
          service: document-service

  - job_name: whatsapp-service
    metrics_path: /metrics
    static_configs:
      - targets: ['whatsapp-service:3005']
        labels:
          service: whatsapp-service

  - job_name: application-service
    metrics_path: /metrics
    static_configs:
      - targets: ['application-service:3006']
        labels:
          service: application-service

  - job_name: privacy-service
    metrics_path: /metrics
    static_configs:
      - targets: ['privacy-service:3007']
        labels:
          service: privacy-service

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:3000']
        labels:
          service: gateway

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
