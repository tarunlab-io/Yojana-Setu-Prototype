version: '3.9'

# ─── Yojana-Setu Docker Compose ───────────────────────────────────────────────
# Development + CI: all services + infrastructure in one compose file.
# For production, use the Kubernetes manifests in infrastructure/k8s/

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - yojana-internal
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-node-env: &node-env
  NODE_ENV: development
  DATABASE_URL: postgresql://yojana:yojana_dev_password@postgres:5432/yojana_setu
  REDIS_URL: redis://:yojana_redis_dev@redis:6379
  ENCRYPTION_KEY: dev_encryption_key_32_bytes_!!!!!
  MASTER_KEY: dev_master_key_32_bytes_here!!!!!

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ys-postgres
    <<: *service-defaults
    environment:
      POSTGRES_USER: yojana
      POSTGRES_PASSWORD: yojana_dev_password
      POSTGRES_DB: yojana_setu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/db/schema-extensions.sql:/docker-entrypoint-initdb.d/02-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yojana -d yojana_setu"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ys-redis
    <<: *service-defaults
    command: redis-server --requirepass yojana_redis_dev --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "yojana_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ys-minio
    <<: *service-defaults
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yojana_minio
      MINIO_ROOT_PASSWORD: yojana_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: ys-minio-init
    networks:
      - yojana-internal
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 yojana_minio yojana_minio_dev_password;
        mc mb --ignore-existing local/yojana-documents;
        mc mb --ignore-existing local/yojana-exports;
        echo 'MinIO buckets ready';
      "

  # ─── Application Services ─────────────────────────────────────────────────

  profile-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: profile-service
    container_name: ys-profile-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheme-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: scheme-service
    container_name: ys-scheme-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3002
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  voice-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: voice-service
    container_name: ys-voice-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3003
      BHASHINI_API_KEY: ${BHASHINI_API_KEY:-}
      BHASHINI_USER_ID: ${BHASHINI_USER_ID:-}
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  document-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: document-service
    container_name: ys-document-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3004
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: yojana_minio
      AWS_SECRET_ACCESS_KEY: yojana_minio_dev_password
      AWS_REGION: ap-south-1
      S3_BUCKET: yojana-documents
      AWS_TEXTRACT_MOCK: "true"
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  whatsapp-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: whatsapp-service
    container_name: ys-whatsapp-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3005
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-AC_dev_placeholder}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-dev_token}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-+14155238886}
      PROFILE_SERVICE_URL: http://profile-service:3001
      SCHEME_SERVICE_URL: http://scheme-service:3002
      VOICE_SERVICE_URL: http://voice-service:3003
      DOCUMENT_SERVICE_URL: http://document-service:3004
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  application-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: application-service
    container_name: ys-application-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3006
      UMANG_API_KEY: ${UMANG_API_KEY:-}
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3005
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  privacy-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: privacy-service
    container_name: ys-privacy-service
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3007
      PROFILE_SERVICE_URL: http://profile-service:3001
      DOCUMENT_SERVICE_URL: http://document-service:3004
      VOICE_SERVICE_URL: http://voice-service:3003
      SCHEME_SERVICE_URL: http://scheme-service:3002
      APPLICATION_SERVICE_URL: http://application-service:3006
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: gateway
    container_name: ys-gateway
    <<: *service-defaults
    environment:
      <<: *node-env
      PORT: 3000
      PROFILE_SERVICE_URL: http://profile-service:3001
      SCHEME_SERVICE_URL: http://scheme-service:3002
      VOICE_SERVICE_URL: http://voice-service:3003
      DOCUMENT_SERVICE_URL: http://document-service:3004
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3005
      APPLICATION_SERVICE_URL: http://application-service:3006
      PRIVACY_SERVICE_URL: http://privacy-service:3007
    ports:
      - "3000:3000"
    depends_on:
      profile-service:
        condition: service_healthy
      scheme-service:
        condition: service_healthy
      application-service:
        condition: service_healthy
      privacy-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ─── Observability ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: ys-prometheus
    <<: *service-defaults
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:latest
    container_name: ys-grafana
    <<: *service-defaults
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: yojana_grafana_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  yojana-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
